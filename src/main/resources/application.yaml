spring:
  application:
    name: worldcup
  profiles:
    default: "dev"
    active: "${SPRING_PROFILES_ACTIVE}"
  datasource:
   driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}