spring:
  application:
    name: worldcup
  profiles:
    default: local
    active: "${SPRING_PROFILES_ACTIVE}"
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

logging:
  level:
    org.flywaydb: DEBUG
