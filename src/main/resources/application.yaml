spring:
  application:
    name: worldcup

  profiles:
    default: "dev"
    active: "${SPRING_PROFILES_ACTIVE}"

  datasource:
    url: jdbc:postgresql://localhost:5432/worldcup
    username: postgres
    password: mariano
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
