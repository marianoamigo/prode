<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pronósticos — ORSAI</title>
  <meta name="theme-color" content="#0d0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/ORSAI.png">
  <link rel="icon" href="/icons/ORSAI.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body>

  <nav class="top-nav">
    <a class="brand-logo" href="/"><img src="/logo/logo.png" alt="ORSAI FC"></a>
    <div id="userSection"></div>
  </nav>

  <!-- TABS FIJOS -->
  <div class="prono-sticky-header">
    <div class="tabs">
      <button class="tab active" onclick="switchPronoTab(this, 'partidos')">Partidos</button>
      <button class="tab" onclick="switchPronoTab(this, 'grupos')">Grupos</button>
    </div>
    <!-- Filtro de fecha: solo visible en tab Partidos -->
    <div class="matchday-filter" id="matchdayFilterBar">
      <button class="mdf-btn" id="filter-16avos" onclick="setPartidoFilter('16avos', this)">16AVOS</button>
      <button class="mdf-btn" id="filter-r16" onclick="setPartidoFilter('r16', this)">Octavos</button>
      <button class="mdf-btn" id="filter-qf" onclick="setPartidoFilter('qf', this)">Cuartos</button>
      <button class="mdf-btn" id="filter-sf" onclick="setPartidoFilter('sf', this)">Semis/Final</button>
      <button class="mdf-btn" id="filter-md1" onclick="setPartidoFilter('md1', this)">Fecha 1</button>
      <button class="mdf-btn" id="filter-md2" onclick="setPartidoFilter('md2', this)">Fecha 2</button>
      <button class="mdf-btn" id="filter-md3" onclick="setPartidoFilter('md3', this)">Fecha 3</button>
      <button class="mdf-btn" id="filter-candidatos" onclick="setPartidoFilter('candidatos', this)">Candidatos</button>
    </div>
  </div>

  <main class="page-container" id="mainContent" style="padding-top:8px;">

    <!-- TAB PARTIDOS -->
    <div id="partidosContainer">
      <div class="empty-state">
        <div style="font-size:32px;margin-bottom:10px;">⏳</div>
        <div>Cargando partidos...</div>
      </div>
    </div>

    <!-- CANDIDATOS (dentro del tab Partidos) -->
    <div id="candidatosContainer" style="display:none;"></div>

    <!-- TAB GRUPOS -->
    <div id="gruposContainer" style="display:none;">
      <div id="groupPredictionContainer">
        <div class="empty-state">
          <div style="font-size:32px;margin-bottom:10px;">⏳</div>
          <div>Cargando grupos...</div>
        </div>
      </div>
    </div>

  </main>

  <!-- MODAL PRONÓSTICO PARTIDO -->
  <div class="modal-overlay" id="gpModal" onclick="closeGPModalOutside(event)">
    <div class="prode-modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Ingresá tu pronóstico</div>
      <div class="modal-teams-row">
        <div style="text-align:center;">
          <img id="gp-modal-flag1" src="" class="modal-flag-img" alt="">
          <div class="modal-team-name" id="gp-modal-team1">—</div>
        </div>
        <div class="score-input-row-modal">
          <div class="score-ctrl">
            <button class="score-btn plus" onclick="changeGPModalScore(0, 1)">+</button>
            <div class="score-num" id="gp-modal-score0">0</div>
            <button class="score-btn minus" onclick="changeGPModalScore(0, -1)">−</button>
          </div>
          <span class="score-dash">:</span>
          <div class="score-ctrl">
            <button class="score-btn plus" onclick="changeGPModalScore(1, 1)">+</button>
            <div class="score-num" id="gp-modal-score1">0</div>
            <button class="score-btn minus" onclick="changeGPModalScore(1, -1)">−</button>
          </div>
        </div>
        <div style="text-align:center;">
          <img id="gp-modal-flag2" src="" class="modal-flag-img" alt="">
          <div class="modal-team-name" id="gp-modal-team2">—</div>
        </div>
      </div>
      <button class="btn-confirmar" onclick="confirmGPPrediction()">Confirmar Pronóstico</button>
      <button class="btn-cancelar" onclick="closeGPModal()">Cancelar</button>
    </div>
  </div>

  <script src="/js/navbar.js"></script>
  <script src="/js/groupPrediction.js?v=4"></script>
  <script src="/js/bottomNav.js"></script>
</body>
</html>
