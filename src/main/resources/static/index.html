<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ORSAI FC</title>
    <meta name="theme-color" content="#0d0f1a">
    <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ORSAI FC">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/ORSAI.png">
  <link rel="icon" href="/icons/ORSAI.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="top-nav">

    <a
            class="brand-logo"
            href="/">

        ORSAI

    </a>

    <div id="userSection">

    </div>

</nav>

<div class="page-container">

    <div class="tabs mb-3">
        <button class="tab active" data-tab="hoy" onclick="switchTab(this, 'hoy')">Hoy</button>
        <button class="tab" data-tab="manana" onclick="switchTab(this, 'manana')">Mañana</button>
        <button class="tab" data-tab="fixture" onclick="switchTab(this, 'fixture')">Fixture</button>
    </div>

    <button class="cal-toggle" id="calToggle" onclick="toggleCalendar()">
        📅 <span id="calDateLabel">Hoy</span> <span id="calArrow">▾</span>
    </button>
    <div class="date-strip" id="dateStrip"></div>

    <!-- Filtro de Fixture (visible solo en tab Fixture) -->
    <div class="matchday-filter" id="fixtureFilterBar" style="display:none;">
      <button class="mdf-btn active" onclick="setFixtureFilter(null, this)">Todo</button>
      <button class="mdf-btn" onclick="setFixtureFilter('md1', this)">Fecha 1</button>
      <button class="mdf-btn" onclick="setFixtureFilter('md2', this)">Fecha 2</button>
      <button class="mdf-btn" onclick="setFixtureFilter('md3', this)">Fecha 3</button>
      <button class="mdf-btn" onclick="setFixtureFilter('r16', this)">Octavos</button>
      <button class="mdf-btn" onclick="setFixtureFilter('qf', this)">Cuartos</button>
      <button class="mdf-btn" onclick="setFixtureFilter('sf', this)">Semis/Final</button>
    </div>

    <h2 id="matchesDateTitle" style="display:none;"></h2>

    <div
            id="matchesContainer">

    </div>

    <div style="display:none;">
        <button id="saveAllButton">Guardar Pronósticos</button>
    </div>

</div>

<div id="bottomNav">

</div>

<!-- MODAL PRONÓSTICO -->
<div class="modal-overlay" id="predModal" onclick="closeModalOutside(event)">
  <div class="prode-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ingresá tu pronóstico</div>
    <div class="modal-teams-row">
      <div style="text-align:center;">
        <img id="modal-flag1" src="" class="modal-flag-img" alt="">
        <div class="modal-team-name" id="modal-team1">—</div>
      </div>
      <div class="score-input-row-modal">
        <div class="score-ctrl">
          <button class="score-btn plus" onclick="changeModalScore(0, 1)">+</button>
          <div class="score-num" id="modal-score0">0</div>
          <button class="score-btn minus" onclick="changeModalScore(0, -1)">−</button>
        </div>
        <span class="score-dash">:</span>
        <div class="score-ctrl">
          <button class="score-btn plus" onclick="changeModalScore(1, 1)">+</button>
          <div class="score-num" id="modal-score1">0</div>
          <button class="score-btn minus" onclick="changeModalScore(1, -1)">−</button>
        </div>
      </div>
      <div style="text-align:center;">
        <img id="modal-flag2" src="" class="modal-flag-img" alt="">
        <div class="modal-team-name" id="modal-team2">—</div>
      </div>
    </div>
    <button class="btn-confirmar" onclick="confirmPrediction()">Confirmar Pronóstico</button>
    <button class="btn-cancelar" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script src="./js/navbar.js"></script>
<script src="./js/bottomNav.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
