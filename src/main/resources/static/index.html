<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1">

    <title>
        ORSAI FC
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            href="./css/style.css">

</head>

<body>

<nav class="top-nav">

    <a
            class="brand-logo"
            href="/">

        ORSAI

    </a>

    <div id="userSection">

    </div>

</nav>

<div class="container mt-4">

    <div
            class="
            d-flex
            justify-content-between
            align-items-center
            mb-4">

        <button
                class="btn btn-outline-secondary"
                onclick="previousDay()">

            ←

        </button>

        <h2
                id="matchesDateTitle"
                class="text-center mb-0">

        </h2>

        <button
                class="btn btn-outline-secondary"
                onclick="nextDay()">

            →

        </button>

    </div>

    <div
            id="matchesContainer">

    </div>

    <div
            class="text-center mt-4 mb-5">

        <button
                id="saveAllButton"
                class="btn btn-success d-none">

            Guardar Pronósticos

        </button>

    </div>

</div>

<div id="bottomNav">

</div>

<script src="./js/navbar.js"></script>
<script src="./js/bottomNav.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
